name: Release

on:
  push:
    tags:
      - 'v*.*.*'    # Matches v1.7.3
      - '*.*.*'      # Matches 1.7.3
      - 'v*.*'       # Matches v2.3
      - '*.*'        # Matches 2.3

permissions:
  contents: write

jobs:
  quality-checks:
    uses: ./.github/workflows/checks.yml

  release:
    needs: quality-checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Extract PHP version
      id: php_version
      run: |
        PHP_VERSION=$(grep -oP 'Requires PHP:\s*\K[\d.]+' umami-tracking/umami-tracking.php || echo "7.4")
        echo "version=$PHP_VERSION" >> $GITHUB_OUTPUT

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ steps.php_version.outputs.version }}
        tools: composer:v2, wp-cli
        coverage: none

    - name: Verify tag matches plugin version
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        PLUGIN_VERSION=$(grep -oP 'Version:\s*\K[\d.]+' umami-tracking/umami-tracking.php)
        
        echo "Tag version: $TAG_VERSION"
        echo "Plugin version: $PLUGIN_VERSION"
        
        if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
          echo "Tag version does not match plugin version!"
          exit 1
        fi

    - name: Install dependencies
      run: |
        composer install --prefer-dist --no-progress --no-dev

    - name: Install WP-CLI dist-archive command
      env:
        # WP-CLI's bundled Composer rejects the runner's ghs_ token when
        # GitHub's longer stateless-token format is in play (its oauth-token
        # validation fails on the format), which makes this step flake. The
        # token is persisted in a config FILE by setup-php, so clearing env
        # vars alone is not enough — strip the persisted github-oauth from
        # every composer home (default + wp-cli's own) and clone the public
        # command anonymously with empty Composer auth.
        GITHUB_TOKEN: ""
        COMPOSER_AUTH: "{}"
      run: |
        composer config --global --unset github-oauth.github.com 2>/dev/null || true
        rm -f "$HOME/.composer/auth.json" \
              "$HOME/.config/composer/auth.json" \
              "$HOME/.wp-cli/packages/auth.json" 2>/dev/null || true
        wp package install wp-cli/dist-archive-command:v3.1.0

    - name: Build plugin
      run: composer run-script build
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: zipped/umami-tracking.zip
        body: |
          Release of Umami Tracking v${{ github.ref_name }}
          
          ## Installation
          1. Download `umami-tracking.zip` from the assets below
          2. In WordPress admin, go to Plugins > Add New > Upload Plugin
          3. Choose the downloaded zip file and click Install Now
          4. Activate the plugin
          5. Configure your Website ID in Settings > Umami Tracking
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
